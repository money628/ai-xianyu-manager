# AI店长 v1.2 Docker 配置模板
# 复制为 config.ini 后填入真实密钥

[system]
version = "1.2"
mode = "arbitrage"
auto_run = true
log_level = "INFO"

[scanner]
seed_categories = 苹果手机壳,iPhone钢化膜,手机壳,数码配件,家居用品,厨房用品,美妆,饰品,文具,运动户外,母婴用品
keywords_per_round = 20
scan_interval_minutes = 60
realtime_push_threshold = 0.30
daily_report_times = ["09:00", "21:00"]
top_n = 10
max_push_per_item = 1

[platforms]
enabled_1688 = false
enabled_pdd = true
enabled_xianyu = true
remote_regions = ["新疆", "西藏"]

[finance]
xianyu_fee = 0.016
domestic_shipping = 3.0
return_reserve = 0.0
ad_cost = 0.0

[arbitrage]
weight_roi = 0.5
weight_sales = 0.3
weight_confidence = 0.2
min_roi_threshold = 0.15
min_confidence = 0.6

[push]
method = email
serverchan_sendkey = ""
dingtalk_webhook = ""
email_enabled = false
smtp_host = "smtp.qq.com"
smtp_port = 465
smtp_user = ""
smtp_pass = ""
email_to = ""

[pdd_api]
client_id = ""
client_secret = ""
api_url = "https://gw-api.pinduoduo.com/api/router"
pid = ""
access_token = ""
refresh_token = ""
custom_parameters = "ai_storekeeper"

[antiscrap]
requests_per_second = 5
max_retries = 3
timeout_seconds = 15
auto_degrade_after_failures = 3
use_playwright = true
# Docker 里以下两项由环境变量 XIANYU_HEADLESS/PDD_HEADLESS 覆盖
pdd_headless = false
xianyu_headless = false

[database]
path = "data/ai_storekeeper.db"
retention_days = 30
price_curve_days = 10

[remote]
ngrok_token = ""

[dingtalk]
app_key = ""
app_secret = ""

[pdd_accounts]
count = 2
account_1_client_id = ""
account_1_client_secret = ""
account_1_access_token = ""
account_1_refresh_token = ""
account_1_pid = ""
account_2_client_id = ""
account_2_client_secret = ""
account_2_access_token = ""
account_2_refresh_token = ""
account_2_pid = ""
